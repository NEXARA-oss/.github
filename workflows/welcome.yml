name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome-pr:
    name: Welcome First-Time PR Author
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 10
            });

            const authorPRs = prs.filter(pr => pr.user.login === creator);
            const isFirstPR = authorPRs.length === 1;

            if (isFirstPR) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `## 🎉 Welcome to Nexara, @${creator}!

            Thank you for your first contribution — this is exactly how great ecosystems are built.

            **What happens next:**
            - A maintainer will review your PR within **2–5 business days**
            - You may receive feedback or change requests — that's a normal part of the process
            - Once approved, your changes ship in the next release and you'll be credited in the changelog

            **While you wait:**
            - 👋 Say hi in [Discord](https://discord.gg/nexara) #introductions
            - 🔍 Browse [other good first issues](https://github.com/nexara-org/neuroweave/labels/good%20first%20issue) if you'd like to keep going
            - 📖 Read the [contributor guide](https://github.com/nexara-org/.github/blob/main/CONTRIBUTING.md) for tips on future PRs

            We're genuinely glad you're here. 🚀`
              });
            }

  welcome-issue:
    name: Welcome First-Time Issue Author
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all',
              per_page: 5
            });

            const authorIssues = issues.filter(i => !i.pull_request);
            const isFirstIssue = authorIssues.length === 1;

            if (isFirstIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `👋 Hi @${creator}, thanks for opening your first issue with Nexara!

            A maintainer will take a look soon. In the meantime:

            - For faster help, join [Discord](https://discord.gg/nexara) and ask in **#help** with full context
            - If this is a bug, make sure you've included a **minimal reproduction** — it dramatically speeds up resolution
            - If this is a feature idea, consider opening a [Discussion](https://github.com/nexara-org/neuroweave/discussions) to gather community input first

            Thank you for helping make Nexara better! 🙌`
              });
            }
